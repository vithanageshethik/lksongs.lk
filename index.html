<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKSongs - Lyrics & Chords Pro</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --card-bg: #161f30;
            --accent-color: #00f2fe;
            --text-main: #ffffff;
            --text-muted: #8fa0bc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--accent-color);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .song-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid #24344d;
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 242, 254, 0.2);
            border-color: var(--accent-color);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
        }

        .thumbnail-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-info {
            padding: 15px;
        }

        .song-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 5px 0;
        }

        .song-artist {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0;
        }

        /* --- Workspace Modal --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--card-bg);
            width: 95%;
            max-width: 1000px;
            height: 85vh;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--accent-color);
            position: relative;
            display: flex;
            flex-direction: row;
        }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; height: 95vh; }
        }

        .left-panel {
            flex: 1.2;
            background-color: #000;
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            padding-top: 56.25%;
            width: 100%;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .modal-info {
            padding: 20px;
        }

        .right-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background-color: #111a28;
            border-left: 1px solid #24344d;
            overflow-y: auto;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background-color: #1e2d42;
            color: #fff;
            border: 1px solid #24344d;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        .content-area {
            flex: 1;
            background-color: #0c131f;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 1rem;
            overflow-y: auto;
            color: #e2e8f0;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
            z-index: 1010;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎵 LKSongs Lyrics & Chords</h1>
    </header>

    <div class="container">
        <div class="songs-grid" id="songsGrid"></div>
    </div>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            
            <div class="left-panel">
                <div class="video-wrapper">
                    <iframe id="youtubeEmbed" src="" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle" style="margin:0 0 5px 0; color:var(--accent-color);"></h2>
                    <p id="modalArtist" style="margin:0; color:var(--text-muted);"></p>
                </div>
            </div>

            <div class="right-panel">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('lyrics')">📝 Lyrics</button>
                    <button class="tab-btn" onclick="switchTab('chords')">🎸 Chords</button>
                </div>
                <div class="content-area" id="tabContent"></div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA GATEWAY (DO NOT REMOVE) ---
        const songs = [
        ];
        // --- END DATA GATEWAY ---

        let currentSong = null;

        function displaySongs() {
            const grid = document.getElementById('songsGrid');
            grid.innerHTML = '';
            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.onclick = () => openPlayer(song);
                card.innerHTML = `
                    <div class="thumbnail-container"><img src="${song.thumbnail}"></div>
                    <div class="song-info">
                        <p class="song-title">${song.title}</p>
                        <p class="song-artist">${song.artist}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openPlayer(song) {
            currentSong = song;
            let videoId = '';
            if(song.youtubeUrl.includes('youtu.be/')) {
                videoId = song.youtubeUrl.split('youtu.be/')[1].split('?')[0];
            } else if(song.youtubeUrl.includes('v=')) {
                videoId = song.youtubeUrl.split('v=')[1].split('&')[0];
            }
            
            document.getElementById('youtubeEmbed').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            document.getElementById('modalTitle').innerText = song.title;
            document.getElementById('modalArtist').innerText = song.artist;
            
            switchTab('lyrics');
            document.getElementById('playerModal').style.display = 'flex';
        }

        function switchTab(type) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons[0].classList.toggle('active', type === 'lyrics');
            buttons[1].classList.toggle('active', type === 'chords');
            
            if(currentSong) {
                document.getElementById('tabContent').innerText = type === 'lyrics' ? currentSong.lyrics : currentSong.chords;
            }
        }

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('youtubeEmbed').src = '';
        }

        displaySongs();
    </script>
</body>
</html>
